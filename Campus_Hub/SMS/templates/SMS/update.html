<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="text-align: center; background-color: azure;">
    <h1 style="text-align: center; background-color: plum;">** UPDATE RECORD **</h1>

    {% if messages %}
        {% for msg in messages %}
            <h2>{{ msg }}</h2>
        {% endfor %}
    {% endif %}


    <div style="text-align: center; font-size: 20px;">
    <form method="post">
        {% csrf_token %}

    ID: <input type="number" name="id" placeholder="Enter Student Id" required><br><br>

    Name: <input type="text" name="name" placeholder="Enter Student Name"><br><br>

    Age: <input type="text" name="age" placeholder="Enter Age"><br><br>

    Gender <select name="gender">
        <option value="">Select Gender</option>
        <option value="M">Male</option>
        <option value="F">Female</option>
        <option value="O">Other</option>
    </select>

    Course: <input type="text" name="course" placeholder="Enter Course Name">

    <button type="submit" style="text-align: center; background-color: beige; height: 35px; width:140;"> Update</button><br><br>

    </form>

    <a href="{% url 'home' %}">Back To Home Page</a><br><br>
    <a href="{% url 'search' %}">Back To Search Page</a><br><br>
    </div>

</body>
</html>
